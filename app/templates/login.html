<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - EstoquePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-screen">
    <div class="login-container animate-up">
        <div class="text-center mb-5">
            <h1 class="login-logo fw-bold">EstoquePro</h1>
            <p class="text-muted">Acesse sua conta com segurança</p>
        </div>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger border-0 shadow-sm mb-4">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-muted">USUÁRIO</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Digite seu usuário" required>
            </div>
            <div class="mb-5 text-start">
                <label class="form-label small fw-bold text-muted">SENHA</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-4 py-3 fw-bold shadow-sm">Entrar no Sistema</button>
        </form>
        
        <div class="text-center">
            <small class="text-muted">Dica: Use <strong>admin</strong> / <strong>admin123</strong> após rodar /setup</small>
        </div>
    </div>
</body>
</html>
