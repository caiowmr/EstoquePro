{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center animate-up">
    <div class="col-lg-6">
        <div class="mb-5 text-center">
            <h1 class="display-5 fw-bold mb-1">{{ 'Editar Categoria' if categoria else 'Nova Categoria' }}</h1>
            <p class="text-muted">Defina grupos para facilitar a gestão do estoque.</p>
        </div>
        
        <div class="bento-item">
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">NOME DA CATEGORIA</label>
                    <input type="text" name="nome" class="form-control" value="{{ categoria.nome if categoria else '' }}" required>
                </div>
                <div class="mb-5">
                    <label class="form-label small fw-bold text-muted">DESCRIÇÃO (OPCIONAL)</label>
                    <textarea name="descricao" class="form-control" rows="3">{{ categoria.descricao if categoria else '' }}</textarea>
                </div>
                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-primary btn-lg py-3">Salvar Categoria</button>
                    <a href="{{ url_for('categorias.listar') }}" class="btn btn-light btn-lg">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
