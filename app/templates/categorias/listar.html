{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-5 animate-up">
    <div>
        <h1 class="display-5 fw-bold mb-1">Categorias</h1>
        <p class="text-muted">Organize seus produtos por grupos lógicos.</p>
    </div>
    <a href="{{ url_for('categorias.nova') }}" class="btn btn-primary">
        <i class="bi bi-plus-lg me-2"></i> Nova Categoria
    </a>
</div>

<div class="table-container animate-up" style="animation-delay: 0.1s;">
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>NOME</th>
                    <th>DESCRIÇÃO</th>
                    <th>PRODUTOS VINCULADOS</th>
                    <th class="text-end">AÇÕES</th>
                </tr>
            </thead>
            <tbody>
                {% for c in categorias %}
                <tr>
                    <td><span class="fw-bold">{{ c.nome }}</span></td>
                    <td>{{ c.descricao or '-' }}</td>
                    <td>
                        <span class="badge bg-pastel-blue text-primary">{{ c.produtos.count() }} itens</span>
                    </td>
                    <td class="text-end">
                        <div class="d-flex gap-2 justify-content-end">
                            <a href="{{ url_for('categorias.editar', id=c.id) }}" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form action="{{ url_for('categorias.remover', id=c.id) }}" method="POST" onsubmit="return confirm('Tem certeza? Isso não pode ser desfeito.');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
